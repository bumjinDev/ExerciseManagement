spring:
  application:
    name: exercisemanagement

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: EXERCISEMGMT
    password: ${DB_PASSWORD}   # 환경 변수로 주입. 소스에 하드코딩하지 않는다.

  jpa:
    hibernate:
      ddl-auto: none           # 스키마는 sql/ 디렉토리의 DDL로만 관리한다
      naming:
        # Wherehouse와 동일: 엔티티 필드명을 그대로 컬럼명으로 매핑 (nickName -> NICKNAME)
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB      # 인증샷 업로드 한도 (명세 12.3 미확정 → Wherehouse와 동일 값으로 확정)
      max-request-size: 12MB

server:
  port: 8186
  servlet:
    context-path: /exercise
    session:
      tracking-modes: cookie   # JSESSIONID를 URL에 노출하지 않음

jwt:
  # JWT 서명 키는 환경 변수 JWT_SECRET_KEY(Base64 인코딩 HMAC-SHA256 키)로 주입받는다.
  # TODO: 만료 시간은 테스트 편의를 위해 14일로 설정. 운영 배포 전 재확정 대상.
  expiration-ms: 1209600000    # 14일 = 14 * 24 * 60 * 60 * 1000

app:
  cookie-secure: false                     # 로컬(HTTP) 기준. HTTPS 배포 프로파일에서 true로 전환
  login-success-path: /members/loginSuccess  # 로그인 성공 후 리다이렉트 경로(컨텍스트 경로 제외)

  # ----- 챌린지 도메인 (단계 3) -----
  base-prize-pool: 500000            # 운영 기본 상금풀. TODO: 잠정값 — 운영 정책 확정 대상
  formation-sum-cap-percent: 10      # 팀 편성 합 상한 r(%). TODO: 잠정값 — 계측 후 재확정 (명세 12.3)
  photo-dir: ./data/photos           # 인증샷 로컬 저장 디렉토리 (변경사항 문서 2-1)
  # 카테고리·종목 닫힌 목록 (변경사항 문서 4-3). 목록 밖 값은 E-REG-UNKNOWN-EXERCISE
  # 주의: Spring Boot는 Map 키에서 영문 소문자·숫자·하이픈 외 문자를 제거하므로,
  #       한글 키는 반드시 대괄호 표기("[키]")로 감싸야 원형이 보존된다.
  exercise-catalog:
    "[가슴]": [벤치프레스, 인클라인 벤치프레스, 체스트프레스]
    "[등]": [데드리프트, 바벨로우, 랫풀다운]
    "[어깨]": [오버헤드프레스, 시티드 숄더프레스]
    "[팔]": [바벨컬, 라잉 트라이셉스 익스텐션]
    "[하체]": [스쿼트, 레그프레스]
